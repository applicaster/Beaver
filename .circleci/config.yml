version: 2.1

# CI pipeline for Beaver. Two workflows:
#
#   on-pull-request  — fast build + test on any non-main branch.
#                      Catches broken builds before merge.
#
#   on-merge-to-main — runs the full release pipeline (build → sign →
#                      notarize → staple → zip → publish GitHub Release).
#                      Idempotent: if the MARKETING_VERSION in the
#                      pbxproj is already released on GitHub, the job
#                      halts cleanly. So most merges (without a version
#                      bump) are a no-op release-wise.
#
# Required CircleCI project environment variables — set under
# Project Settings → Environment Variables:
#
#   APPLE_ID                   Apple ID (email) on the Developer Program account
#   APPLE_APP_PASSWORD         App-specific password from appleid.apple.com
#   APPLE_TEAM_ID              10-character team ID (e.g. WZZ4E5L8EL)
#   DEVELOPER_ID_APPLICATION   Full cert string ("Developer ID Application: Applicaster Ltd. (WZZ4E5L8EL)")
#   DEVELOPER_ID_P12_BASE64    Base-64 encoded .p12 export of the cert + private key.
#                              Export from Keychain Access → right-click cert → Export
#                              → choose .p12 → set a password → then on your Mac:
#                                  base64 -i Beaver.p12 | pbcopy
#                              and paste into CircleCI as a single line.
#   DEVELOPER_ID_P12_PASSWORD  The password you set when exporting the .p12.
#   GITHUB_TOKEN               Personal access token (fine-grained or classic with `repo` scope).
#                              Used by `gh release create` to publish the .zip.

executors:
  macos:
    macos:
      # Matches ZappAppleBuilder's pinned Xcode (the canonical
      # Applicaster CI config). Bump together with that project so
      # the build environments stay aligned.
      xcode: "26.2.0"
    # The new-style M4 Pro resource class (CircleCI renamed away from
    # `macos.m1.*.gen1`). Same as ZappAppleBuilder uses.
    resource_class: m4pro.medium

jobs:
  build-and-test:
    executor: macos
    steps:
      - checkout
      - restore_cache:
          name: Restore SPM cache
          keys:
            - v1-spm-{{ checksum "Beaver.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" }}
            - v1-spm-
      - run:
          name: Resolve Swift packages
          command: xcodebuild -resolvePackageDependencies -project Beaver.xcodeproj
      - save_cache:
          name: Save SPM cache
          paths:
            - ~/Library/Developer/Xcode/DerivedData/Beaver-*/SourcePackages
          key: v1-spm-{{ checksum "Beaver.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved" }}
      - run:
          name: Build (Debug)
          command: make build
      - run:
          name: Unit tests
          command: make test

  release:
    executor: macos
    steps:
      - checkout

      # ── Install the GitHub CLI — needed for release-exists check
      #    and for publishing the release at the end. CircleCI macOS
      #    images don't ship `gh` by default.
      - run:
          name: Install gh (GitHub CLI)
          command: |
            if ! command -v gh >/dev/null 2>&1; then
              brew install gh
            fi
            gh --version

      # ── Read current MARKETING_VERSION from the pbxproj ─────────────
      - run:
          name: Compute next version from commit messages
          command: |
            # Convention (see DECISIONS.md D23):
            #   release: → MAJOR  •  feat: → MINOR  •  anything else → PATCH
            # Highest-impact prefix in commits since the last tag wins.
            VERSION="$(./scripts/compute-next-version.sh --verbose)"
            if [ -z "$VERSION" ]; then
              echo "❌ compute-next-version.sh returned empty"; exit 1
            fi
            echo "Releasing Beaver ${VERSION}"
            echo "export BEAVER_VERSION=${VERSION}" >> "$BASH_ENV"

      # ── Idempotency: skip if this version already has a Release ─────
      - run:
          name: Skip if release already exists
          command: |
            # gh auth is GITHUB_TOKEN-based (env var picked up
            # automatically). We separate "release exists" from "gh
            # errored" by checking the exit code explicitly — otherwise
            # a transient gh failure would look like "release missing"
            # and trigger a duplicate publish attempt.
            if gh release view "${BEAVER_VERSION}" \
                 --repo applicaster/Beaver >/dev/null 2>&1; then
              echo "✅ Release ${BEAVER_VERSION} already exists. Halting."
              circleci-agent step halt
            fi
            # Distinguish "not found" (expected) from "auth error"
            # (must fail). A second call with --json forces gh to
            # actually contact GitHub; auth failures surface here.
            gh api /repos/applicaster/Beaver >/dev/null
            echo "Release ${BEAVER_VERSION} not found — proceeding."

      # ── Set up an ephemeral keychain with the Developer ID cert ─────
      - run:
          name: Import Developer ID Application certificate
          command: |
            set -euo pipefail
            KEYCHAIN=ci.keychain
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

            echo "${DEVELOPER_ID_P12_BASE64}" | base64 --decode > /tmp/cert.p12

            security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
            security default-keychain -s "${KEYCHAIN}"
            security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
            # Keep the keychain unlocked for the duration of the build.
            security set-keychain-settings -t 7200 -u "${KEYCHAIN}"

            security import /tmp/cert.p12 \
              -k "${KEYCHAIN}" \
              -P "${DEVELOPER_ID_P12_PASSWORD}" \
              -T /usr/bin/codesign \
              -T /usr/bin/security \
              -T /usr/bin/productbuild

            # Allow codesign to use the private key without GUI prompt.
            security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"

            rm -f /tmp/cert.p12
            security find-identity -v -p codesigning

      # ── Apply the version bump to the pbxproj ───────────────────────
      #
      # MARKETING_VERSION feeds CFBundleShortVersionString in the .app's
      # Info.plist (visible to users + Sparkle). CURRENT_PROJECT_VERSION
      # feeds CFBundleVersion (the monotonic build number Sparkle uses
      # to order updates). Both get bumped here so the build picks them
      # up. The bump is committed after make release succeeds — that
      # way a failed build doesn't leave behind an unreleased bump.
      - run:
          name: Apply version bump to pbxproj
          command: |
            set -euo pipefail
            PBXPROJ="Beaver.xcodeproj/project.pbxproj"

            # Skip if pbxproj already at the target version (manual
            # bump path — compute-next-version.sh detected it).
            CURRENT_MARKETING="$(grep -m1 'MARKETING_VERSION = ' "$PBXPROJ" \
                | sed 's/.*= //; s/;//' | tr -d '[:space:]')"
            if [ "$CURRENT_MARKETING" = "$BEAVER_VERSION" ]; then
              echo "ℹ️  pbxproj already at ${BEAVER_VERSION}. Skipping bump."
              exit 0
            fi

            echo "▸ Bumping MARKETING_VERSION ${CURRENT_MARKETING} → ${BEAVER_VERSION}"
            sed -i.bak "s/MARKETING_VERSION = [0-9.]*;/MARKETING_VERSION = ${BEAVER_VERSION};/g" "$PBXPROJ"

            CURRENT_BUILD="$(grep -m1 'CURRENT_PROJECT_VERSION = ' "$PBXPROJ" \
                | sed 's/.*= //; s/;//' | tr -d '[:space:]')"
            NEW_BUILD="$((CURRENT_BUILD + 1))"
            echo "▸ Bumping CURRENT_PROJECT_VERSION ${CURRENT_BUILD} → ${NEW_BUILD}"
            sed -i.bak "s/CURRENT_PROJECT_VERSION = ${CURRENT_BUILD};/CURRENT_PROJECT_VERSION = ${NEW_BUILD};/g" "$PBXPROJ"

            rm -f "${PBXPROJ}.bak"

      # ── Build, sign, notarize, zip ──────────────────────────────────
      - run:
          name: make release
          # The release script reads APPLE_ID / APPLE_APP_PASSWORD /
          # APPLE_TEAM_ID / DEVELOPER_ID_APPLICATION from the env, the
          # same way `.envrc.local` does locally.
          command: make release
          no_output_timeout: 15m

      # ── Commit the version bump, tag, push both, then publish ──────
      - run:
          name: Commit bump + tag + push + publish GitHub Release
          command: |
            set -euo pipefail
            git config user.name  "CircleCI"
            git config user.email "ci@applicaster.com"

            REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/applicaster/Beaver.git"
            PBXPROJ="Beaver.xcodeproj/project.pbxproj"

            # 1. Commit the pbxproj bump if the file is dirty.
            if ! git diff --quiet "$PBXPROJ"; then
              git add "$PBXPROJ"
              git commit -m "version ${BEAVER_VERSION} [skip ci]"
              git push "$REMOTE" HEAD:main
            else
              echo "ℹ️  pbxproj clean — no bump commit to push."
            fi

            # 2. Tag the (now possibly bump-) commit if not already tagged.
            if ! git rev-parse "${BEAVER_VERSION}" >/dev/null 2>&1; then
              git tag -a "${BEAVER_VERSION}" -m "Beaver ${BEAVER_VERSION}"
              git push "$REMOTE" "${BEAVER_VERSION}"
            fi

            # 3. Extract release notes — try a versioned section first
            #    (## [X.Y.Z]), fall back to [Unreleased].
            NOTES=$(awk -v ver="${BEAVER_VERSION}" '
              $0 ~ "^## \\[" ver "\\]"   { capturing = 1; next }
              capturing && /^## /        { capturing = 0 }
              capturing
            ' CHANGELOG.md | sed '/./,$!d')
            if [ -z "${NOTES}" ]; then
              NOTES=$(awk '
                /^## \[Unreleased\]/   { capturing = 1; next }
                /^## /                 { capturing = 0 }
                capturing
              ' CHANGELOG.md | sed '/./,$!d')
            fi
            if [ -z "${NOTES}" ]; then
              NOTES="Auto-released from $(git rev-parse --short HEAD)."
            fi

            # 4. Make a stable-named copy. GitHub's
            #    /releases/latest/download/<asset> endpoint only
            #    works with a fixed filename, so the install
            #    landing page (docs/index.html) and any team
            #    members who bookmark the URL hit the same name
            #    across versions:
            #
            #      https://github.com/applicaster/Beaver/releases/latest/download/Beaver.zip
            #
            #    The versioned copy is kept too so old appcast
            #    entries and direct-version downloads still work.
            cp "build/Beaver-${BEAVER_VERSION}.zip" "build/Beaver.zip"

            # 5. Publish the GitHub Release with both zips.
            gh release create "${BEAVER_VERSION}" \
              "build/Beaver-${BEAVER_VERSION}.zip" \
              "build/Beaver.zip" \
              --title "Beaver ${BEAVER_VERSION}" \
              --notes "${NOTES}" \
              --repo applicaster/Beaver

      # ── Sparkle: update appcast.xml back on main with [skip ci] ────
      #
      # scripts/release.sh already produced the signed appcast entry
      # if SPARKLE_PRIVATE_KEY_BASE64 was set on this run. We just
      # need to commit + push the resulting docs/appcast.xml change.
      # The "[skip ci]" suffix prevents this commit from re-triggering
      # the workflow (which would otherwise hit the idempotency check
      # and halt, but at the cost of a wasted runner minute).
      - run:
          name: Push updated appcast to main
          command: |
            set -euo pipefail
            if git diff --quiet docs/appcast.xml; then
              echo "ℹ️  appcast.xml unchanged — skipping push."
              exit 0
            fi
            git config user.name  "CircleCI"
            git config user.email "ci@applicaster.com"
            git add docs/appcast.xml
            git commit -m "appcast: Beaver ${BEAVER_VERSION} [skip ci]"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/applicaster/Beaver.git" \
                HEAD:main

      - store_artifacts:
          path: build
          destination: build

workflows:
  on-pull-request:
    jobs:
      - build-and-test:
          filters:
            branches:
              ignore: main

  on-merge-to-main:
    jobs:
      - release:
          filters:
            branches:
              only: main
